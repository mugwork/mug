name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - CLI
        - Connectors / Data Sync
        - Workflows
        - Surfaces (forms, portals)
        - AI / Agents
        - Notifications (email, SMS)
        - Slack
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would the ideal solution look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds you've considered
